name: Build and Release

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    # We use macos-13 specifically for macOS because it runs on Intel (x86_64).
    # macos-14+ runs on Apple Silicon (ARM64), which would create a binary 
    # requiring Rosetta to run on an Intel Mac.
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-13, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Tests
      run: |
        python -m pytest tests/ -v

    - name: Build with PyInstaller
      run: |
        pyinstaller dxf2xyz.spec --clean --noconfirm

    - name: Upload macOS Artifact
      if: matrix.os == 'macos-13'
      uses: actions/upload-artifact@v4
      with:
        name: DXF_to_XYZ_macOS_Intel
        path: dist/DXF to XYZ.app
        
    - name: Upload Windows Artifact
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: DXF_to_XYZ_Windows
        path: dist/DXF to XYZ.exe
