name: Build and Release

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    # We use macos-13 specifically for macOS because it runs on Intel (x86_64).
    # macos-14+ runs on Apple Silicon (ARM64), which would create a binary 
    # requiring Rosetta to run on an Intel Mac.
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-13, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Tests
      run: |
        python -m pytest tests/ -v

    - name: Build with PyInstaller
      run: |
        pyinstaller dxf2xyz.spec --clean --noconfirm

    - name: Package macOS App
      if: matrix.os == 'macos-13'
      run: |
        cd dist
        zip -r "DXF-to-XYZ-macOS.zip" "DXF to XYZ.app"
        
    - name: Rename Windows Executable
      if: matrix.os == 'windows-latest'
      run: |
        cd dist
        Rename-Item -Path "DXF to XYZ.exe" -NewName "DXF-to-XYZ-Windows.exe"

    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Latest Release
        draft: false
        prerelease: false
        files: |
          dist/DXF-to-XYZ-macOS.zip
          dist/DXF-to-XYZ-Windows.exe
